<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fingerprint Verification</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h2>Fingerprint Verification</h2>
        <form action="{{ url_for('fingerprint_verification') }}" method="POST">
            <div class="form-group">
                <label for="fingerprint">Enter Fingerprint Hash</label>
                <input type="text" class="form-control" id="fingerprint" name="fingerprint_hash" required>
            </div>
            <button type="submit" class="btn btn-primary">Verify Fingerprint</button>
        </form>
    </div>
</body>
</html>
